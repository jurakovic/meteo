<!DOCTYPE html>
<html lang="hr-HR">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<link rel="icon" type="image/png" sizes="16x16" href="/_assets/img/favicon-16x16.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/_assets/img/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="192x192" href="/_assets/img/android-chrome-192x192.png">
	<link rel="apple-touch-icon" sizes="180x180" href="/_assets/img/apple-touch-icon.png">
	<title>Meteo radari</title>
	<!-- seo -->
	<link rel="stylesheet" href="/_assets/css/styles.css">
	<script src="/_assets/js/maps.js" defer></script>
	<script src="/_assets/js/main.js" defer></script>
	<script src="/_assets/js/include.js" defer></script>
	<!-- gtag -->
</head>
<body>
	<div class="container">
		<div class="progress-container">
			<div class="progress-bar"></div>
		</div>
		<h2 align="center">Meteo radari</h2>
		<hr>
		<table border="0" align="center" cellpadding="0" cellspacing="0">
			<tbody>
				<tr>
					<td align="center">
						<div class="buttons">
							<a href="/extras/index.html" style="text-decoration: none"><div class="btn">Više</div></a>
							<button type="button" class="btn" onclick="toggleMapSettings()">Karte</button>
							<div class="links-btn">
								<button type="button" class="btn" onclick="scrollToElement('links')">Linkovi</button>
								<input type="checkbox" class="links-toggle" onchange="toggleLinksBottom(this)" title="Prikaži linkove ispod karata" />
							</div>
						</div>
					</td>
				</tr>
				<tr>
					<td align="center">
						<div class="map-settings" id="mapSettings" hidden></div>
					</td>
				</tr>
				<tr class="sp"></tr>
			</tbody>

			<tbody data-maps data-page="index"></tbody>

			<tbody>
				<tr>
					<td align="center" id="links">
						<button type="button" class="expandable">
							<span>Linkovi</span>
							<span class="arrow">▼</span>
						</button>
					</td>
				</tr>
				<tr>
					<td align="left">
						<div class="links" data-include-html="/_components/links.c.html"></div>
					</td>
				</tr>
			</tbody>
		</table>
		<!-- cnt -->
	</div>
	<footer>
		<a onclick="scrollToTop()" style="cursor: pointer">Povratak na vrh</a>
		·
		<a href="/extras/index.html">Više</a>
		|
		<a href="https://jurakovic.github.io">Projekti</a>
		·
		<a href="https://github.com/jurakovic/meteo">GitHub</a>
	</footer>
</body>
</html>
